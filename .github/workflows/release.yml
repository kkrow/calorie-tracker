name: Build and Release APK

on:
  push:
    tags:
      - "v*"
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Write release keystore from GitHub Secrets
        run: |
          echo "${RELEASE_KEYSTORE_B64}" | base64 --decode > "${RUNNER_TEMP}/release-keystore.jks"
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}

      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: release
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
